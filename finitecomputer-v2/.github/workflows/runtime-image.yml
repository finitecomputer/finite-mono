name: Agent Runtime Image

run-name: Publish agent runtime ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag, for example 2026-07-02.1"
        required: true
        type: string
      finitechat_ref:
        description: "finitecomputer/finitechat ref to package"
        required: true
        default: "main"
        type: string
      finite_sites_ref:
        description: "finitecomputer/finite-sites ref to package"
        required: true
        default: "main"
        type: string
      finite_brain_ref:
        description: "finitecomputer/finite-brain ref to package"
        required: true
        default: "main"
        type: string
      hermes_agent_version:
        description: "hermes-agent package version"
        required: true
        default: "0.18.0"
        type: string
      runs_on_json:
        description: "GitHub runner labels JSON"
        required: true
        default: '["self-hosted","finite-lat-2"]'
        type: string

concurrency:
  group: agent-runtime-image-${{ inputs.version }}

jobs:
  publish:
    runs-on: ${{ fromJSON(inputs.runs_on_json) }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout finitecomputer-v2
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Checkout finitechat
        run: |
          rm -rf ../finitechat
          git clone https://github.com/finitecomputer/finitechat.git ../finitechat
          git -C ../finitechat checkout "${{ inputs.finitechat_ref }}"
          git -C ../finitechat rev-parse HEAD

      - name: Checkout finite-sites
        run: |
          rm -rf ../finite-sites
          git clone https://github.com/finitecomputer/finite-sites.git ../finite-sites
          git -C ../finite-sites checkout "${{ inputs.finite_sites_ref }}"
          git -C ../finite-sites rev-parse HEAD

      - name: Checkout finite-brain
        run: |
          rm -rf ../finite-brain
          git clone https://github.com/finitecomputer/finite-brain.git ../finite-brain
          git -C ../finite-brain checkout "${{ inputs.finite_brain_ref }}"
          git -C ../finite-brain rev-parse HEAD

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push runtime image
        id: build
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/finite-agent-runtime
          VERSION: ${{ inputs.version }}
          HERMES_AGENT_VERSION: ${{ inputs.hermes_agent_version }}
        run: |
          scripts/build_runtime_image.py \
            --image-ref "$IMAGE:$VERSION" \
            --hermes-agent-version "$HERMES_AGENT_VERSION" \
            --finitechat-repo ../finitechat \
            --finite-sites-repo ../finite-sites \
            --finite-brain-repo ../finite-brain \
            --platform linux/amd64 \
            --push \
            --report runtime-image-report.json
          DIGEST="$(docker image inspect "$IMAGE:$VERSION" --format '{{index .RepoDigests 0}}' | sed "s#^$IMAGE@##")"
          if [ -z "$DIGEST" ]; then
            echo "::error::docker did not report a pushed digest"
            cat runtime-image-report.json
            exit 1
          fi
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "pinned=$IMAGE:$VERSION@$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Upload build report
        uses: actions/upload-artifact@v4
        with:
          name: runtime-image-report
          path: runtime-image-report.json

      - name: Summarize
        env:
          PINNED: ${{ steps.build.outputs.pinned }}
        run: |
          echo "Pinned runtime image:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`$PINNED\`" >> "$GITHUB_STEP_SUMMARY"
