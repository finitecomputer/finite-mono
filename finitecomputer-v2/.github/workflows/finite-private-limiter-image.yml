name: Finite Private Limiter Image

run-name: Publish finite-private-limiter ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag, for example 2026-05-26.1"
        required: true
        type: string

concurrency:
  group: finite-private-limiter-image-${{ inputs.version }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push limiter image
        id: build
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/finite-private-limiter
          VERSION: ${{ inputs.version }}
        run: |
          docker buildx create --use
          docker buildx build \
            --platform linux/amd64 \
            --file deploy/finite-computer/images/private-limiter.Dockerfile \
            --tag "$IMAGE:$VERSION" \
            --metadata-file image-metadata.json \
            --push \
            .
          DIGEST="$(jq -r '."containerimage.digest"' image-metadata.json)"
          if [ -z "$DIGEST" ] || [ "$DIGEST" = "null" ]; then
            echo "::error::docker buildx did not return an image digest"
            cat image-metadata.json
            exit 1
          fi
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "pinned=$IMAGE:$VERSION@$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Summarize
        env:
          PINNED: ${{ steps.build.outputs.pinned }}
        run: |
          echo "Pinned limiter image:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`$PINNED\`" >> "$GITHUB_STEP_SUMMARY"
