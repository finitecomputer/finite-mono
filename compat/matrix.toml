# Compatibility matrix: what finite-mono cannot see from one checkout.
#
# Inside the monorepo, same-commit compatibility is automatic. This file
# exists for the artifacts already OUT THERE — released binaries installed on
# user machines and hosted agents running older runtime images — so a change
# that would strand them is a deliberate, reviewed act (edit this file in the
# same PR) instead of an accident.
#
# Maintained by hand at release time. Each release checklist in
# infra/runbooks/ includes "update compat/matrix.toml".

[field.finitechat-cli]
# Released CLI versions believed installed in the field (hosted agents use
# releases/latest at install time).
released = ["v0.1.0", "v0.1.1", "v0.1.2", "v0.1.3", "v0.1.4"]
install_url = "https://github.com/finitecomputer/finite-mono/releases/download/finitechat-latest/"
notes = "Hard-cut 2026-07-08: installers point at the finite-mono rolling alias. The pre-cut releases listed above were installed from the legacy repo URL; no live users depend on it. v0.1.4 adds the signed and notarized Apple Silicon Electron client while preserving the CLI/server protocol. Server must keep accepting these clients until a deprecation is announced."

[field.finitechat-electron]
released = ["v0.1.4"]
install_url = "https://github.com/finitecomputer/finite-mono/releases/download/finitechat-latest/finitechat-electron-macos-aarch64.zip"
notes = "Developer ID-signed and Apple-notarized direct-download app for Apple Silicon. Electron is a distinct revocable Device on the user's existing Finite Chat account; v0.1.4 includes revoked-device recovery and microphone permission for upcoming voice features."

[field.fsite-cli]
released = ["v0.3.1", "v0.4.0"]
install_url = "https://github.com/finitecomputer/finite-mono/releases/download/fsite-latest/"
notes = "v0.4.0 is the first mono-cut release (also ships finitesitesd-linux for the server deploy)."

[field.fbrain-cli]
released = ["v0.1.2", "v0.1.3"]
install_url = "https://github.com/finitecomputer/finite-mono/releases/download/fbrain-latest/"
notes = "v0.1.3 hard-cuts durable CLI unlock state, scopes raw Folder Keys to operations, enforces private Brain Working Tree control paths, and adds Product Client Session Lock. The release also ships the finite-brain server binary for the smoke bridge."

[field.agent-runtime-image]
# Hosted agents pinned at launch time; they do NOT auto-update.
image = "ghcr.io/finitecomputer/agent-runtime"
deployed = ["2026-07-10.2", "2026-07-10.3", "2026-07-10.4", "2026-07-10.5", "2026-07-10.6", "2026-07-11.2", "2026-07-11.3", "2026-07-11.4", "2026-07-11.6", "2026-07-14.1", "2026-07-14.2", "2026-07-14.3", "2026-07-15.1", "2026-07-15.2", "2026-07-15.3", "2026-07-15.4", "2026-07-15.5", "2026-07-16.1", "2026-07-16.2", "2026-07-21.1", "2026-07-22.1"]
digest = "sha256:1e87c7eef0251ee3823e8ed276fddca071e764ec661851042cf35be51eb62eea"
source_commit = "af6aad4982267709f3f956e72afed6136d95592c"
hermes = "0.18.2"
notes = "Kata launches the immutable digest through a promoted Core artifact. Existing agents can be rolled serially through Core's guarded same-volume upgrade path while preserving their Agent Principal and durable /data mount. 2026-07-22.1 makes an existing dashboard-entered OpenRouter key durable across Hermes restarts and removes it from generated config. Its exact image passed the build-once durable restart smoke. Waffle Prime then migrated its legacy key, kept the same container and /data mount, and returned two real OpenRouter replies across two Hermes-only restarts. It remains the sole acceptance target; the default for new launches and remaining fleet stay pinned pending owner acceptance."

[servers]
finitechat_server = { host = "finite-lat-1", deployed_from = "finite-mono NixOS flake", contract = "loopback :8788 behind chat.finite.computer" }
finitechat_hosted_device = { host = "finite-lat-1", deployed_from = "finite-mono NixOS flake", contract = "loopback :38918, shared server-only token with dashboard" }
finite_saas_core = { host = "finite-lat-1", deployed_from = "finite-mono NixOS flake", contract = "loopback :4200, native Postgres" }
finite_saas_dashboard = { host = "finite-lat-1", deployed_from = "2026-07-22.2@sha256:0e41ddd752a88261a0dafe1fc62e50d6206fd8737ce9bc043bffc6f414d8f04c", contract = "finite.computer, WorkOS + Stripe customer mode; Finite Private usage, reset, and reset-time controls; hosted Device list; Electron bridge is capability-gated and otherwise preserves hosted chat; revoked Electron devices can re-link without changing the WorkOS user identity; Skills visible to signed-in users; Brain navigation disabled while the Identity Authority cutover remains deferred" }
finitesitesd = { host = "finite-lat-1", deployed_from = "finite-mono NixOS flake", contract = "loopback :8787 behind api.finite.chat and site domains" }
finite_brain = { host = "finite-lat-1", deployed_from = "finite-mono NixOS flake", contract = "loopback :3015; WorkOS-gated /client and Brain-authorized /_admin through the dashboard proxy" }
