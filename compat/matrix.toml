# Compatibility matrix: what finite-mono cannot see from one checkout.
#
# Inside the monorepo, same-commit compatibility is automatic. This file
# exists for the artifacts already OUT THERE — released binaries installed on
# user machines and hosted agents running older runtime images — so a change
# that would strand them is a deliberate, reviewed act (edit this file in the
# same PR) instead of an accident.
#
# Maintained by hand at release time. Each release checklist in
# infra/runbooks/ includes "update compat/matrix.toml".

[field.finitechat-cli]
# Released CLI versions believed installed in the field (hosted agents use
# releases/latest at install time).
released = ["v0.1.0", "v0.1.1", "v0.1.2", "v0.1.3"]
install_url = "https://github.com/finitecomputer/finite-mono/releases/download/finitechat-latest/"
notes = "Hard-cut 2026-07-08: installers point at the finite-mono rolling alias. The pre-cut releases listed above were installed from the legacy repo URL; no live users depend on it. Server must keep accepting these clients until a deprecation is announced."

[field.fsite-cli]
released = ["v0.3.1", "v0.4.0"]
install_url = "https://github.com/finitecomputer/finite-mono/releases/download/fsite-latest/"
notes = "v0.4.0 is the first mono-cut release (also ships finitesitesd-linux for the server deploy)."

[field.fbrain-cli]
released = ["v0.1.2"]
notes = "v0.1.2 (2026-07-08) is the first public fbrain release, cut from mono; also ships the finite-brain server binary for the smoke nix bridge."

[field.agent-runtime-image]
# Hosted agents pinned at launch time; they do NOT auto-update.
image = "ghcr.io/finitecomputer/agent-runtime"
deployed = ["2026-07-10.2", "2026-07-10.3", "2026-07-10.4", "2026-07-10.5", "2026-07-10.6"]
digest = "sha256:4d5ed21a07b89cfa781866543fec2bdb4bbf83f5fde559723ef976f1989ca121"
source_commit = "43a9ba765edbd7c8bc66c4c6504abd5bb4bafc7a"
hermes = "0.18.2"
notes = "Kata launches the immutable digest through a promoted Core artifact. Existing agents retain their launch-time image and update at their own pace."

[servers]
finitechat_server = { host = "finite-lat-1", deployed_from = "finite-mono NixOS flake", contract = "loopback :8788 behind chat.finite.computer" }
finitechat_hosted_device = { host = "finite-lat-1", deployed_from = "finite-mono NixOS flake", contract = "loopback :38918, shared server-only token with dashboard" }
finite_saas_core = { host = "finite-lat-1", deployed_from = "finite-mono NixOS flake", contract = "loopback :4200, native Postgres" }
finite_saas_dashboard = { host = "finite-lat-1", deployed_from = "2026-07-10.5@sha256:9bb75162aefffab8d4478d4ca11f0b747df2221731b302129d5bb89803f06422", contract = "finite.computer, WorkOS + Stripe test mode" }
finitesitesd = { host = "finite-lat-1", deployed_from = "finite-mono NixOS flake", contract = "loopback :8787 behind api.finite.chat and site domains" }
finite_brain = { host = "finite-lat-1", deployed_from = "finite-mono NixOS flake", contract = "loopback :3015 through WorkOS-protected dashboard routes plus Nostr authorization" }
