# Compatibility matrix: what finite-mono cannot see from one checkout.
#
# Inside the monorepo, same-commit compatibility is automatic. This file
# exists for the artifacts already OUT THERE — released binaries installed on
# user machines and hosted agents running older runtime images — so a change
# that would strand them is a deliberate, reviewed act (edit this file in the
# same PR) instead of an accident.
#
# Maintained by hand at release time. Each release checklist in
# infra/runbooks/ includes "update compat/matrix.toml".

[field.finitechat-cli]
# Released CLI versions believed installed in the field (hosted agents use
# releases/latest at install time).
released = ["v0.1.0", "v0.1.1", "v0.1.2", "v0.1.3"]
install_url = "https://github.com/finitecomputer/finite-mono/releases/download/finitechat-latest/"
notes = "Hard-cut 2026-07-08: installers point at the finite-mono rolling alias. The pre-cut releases listed above were installed from the legacy repo URL; no live users depend on it. Server must keep accepting these clients until a deprecation is announced."

[field.fsite-cli]
released = ["v0.3.1", "v0.4.0"]
install_url = "https://github.com/finitecomputer/finite-mono/releases/download/fsite-latest/"
notes = "v0.4.0 is the first mono-cut release (also ships finitesitesd-linux for the server deploy)."

[field.fbrain-cli]
released = ["v0.1.2", "v0.1.3"]
install_url = "https://github.com/finitecomputer/finite-mono/releases/download/fbrain-latest/"
notes = "v0.1.3 hard-cuts durable CLI unlock state, scopes raw Folder Keys to operations, enforces private Vault Working Tree control paths, and adds Product Client Session Lock. The release also ships the finite-brain server binary for the smoke bridge."

[field.agent-runtime-image]
# Hosted agents pinned at launch time; they do NOT auto-update.
image = "ghcr.io/finitecomputer/agent-runtime"
deployed = ["2026-07-10.2", "2026-07-10.3", "2026-07-10.4", "2026-07-10.5", "2026-07-10.6", "2026-07-11.2", "2026-07-11.3", "2026-07-11.4", "2026-07-11.6", "2026-07-14.1", "2026-07-14.2", "2026-07-14.3", "2026-07-15.1", "2026-07-15.2", "2026-07-15.3", "2026-07-15.4", "2026-07-15.5", "2026-07-16.1", "2026-07-16.2", "2026-07-21.1"]
digest = "sha256:6f8ee0c18af13fd1ac56a0cd76fe199a1b78c22eed4373df262bca864f0bf9f8"
source_commit = "28c1e55dced1fb5e972d88651367248e24c102ff"
hermes = "0.18.2"
notes = "Kata launches the immutable digest through a promoted Core artifact. Existing agents can be rolled serially through Core's guarded same-volume upgrade path while preserving their Agent Principal and durable /data mount. 2026-07-21.1 adds Finite Private threshold/reset-time notices in the existing chat error surface. Its exact image passed the durable two-turn restart smoke; Upgrade Canary 0715 was upgraded once with an unchanged Agent Principal, one /data writer, and a successful authenticated usage-status call. New launches use this artifact. The remaining existing fleet stays on its prior pinned artifacts until a separately reviewed cohort wave."

[servers]
finitechat_server = { host = "finite-lat-1", deployed_from = "finite-mono NixOS flake", contract = "loopback :8788 behind chat.finite.computer" }
finitechat_hosted_device = { host = "finite-lat-1", deployed_from = "finite-mono NixOS flake", contract = "loopback :38918, shared server-only token with dashboard" }
finite_saas_core = { host = "finite-lat-1", deployed_from = "finite-mono NixOS flake", contract = "loopback :4200, native Postgres" }
finite_saas_dashboard = { host = "finite-lat-1", deployed_from = "2026-07-22.1@sha256:0a0d188fb2bee5feec31d6382406b2755a8f46c2480decc996eb36ff186ece88", contract = "finite.computer, WorkOS + Stripe customer mode; Finite Private usage, reset, and reset-time controls; hosted Device list; Electron bridge is capability-gated and otherwise preserves hosted chat; Skills visible to signed-in users; Brain navigation disabled while the Identity Authority cutover remains deferred" }
finitesitesd = { host = "finite-lat-1", deployed_from = "finite-mono NixOS flake", contract = "loopback :8787 behind api.finite.chat and site domains" }
finite_brain = { host = "finite-lat-1", deployed_from = "finite-mono NixOS flake", contract = "loopback :3015; WorkOS-gated /client and Brain-authorized /_admin through the dashboard proxy" }
