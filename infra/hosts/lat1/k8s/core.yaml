apiVersion: v1
kind: Service
metadata:
  name: finite-saas-core
  namespace: finite-system
spec:
  selector:
    app.kubernetes.io/name: finite-saas-core
  ports:
    - name: http
      port: 4200
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finite-saas-core
  namespace: finite-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: finite-saas-core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: finite-saas-core
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until pg_isready --host=finite-core-postgres --username=finite --dbname=finite_core; do sleep 2; done
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: finite-computer-secrets
                  key: POSTGRES_PASSWORD
      containers:
        - name: core
          image: localhost/finite-saas-core:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4200
          env:
            - name: FC_CORE_BIND
              value: "0.0.0.0:4200"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: finite-computer-secrets
                  key: POSTGRES_PASSWORD
            - name: FC_CORE_DATABASE_URL
              value: "postgresql://finite:$(POSTGRES_PASSWORD)@finite-core-postgres:5432/finite_core"
            - name: FC_CORE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: finite-computer-secrets
                  key: FC_CORE_API_TOKEN
            - name: FC_CORE_RUNNER_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: finite-computer-secrets
                  key: FC_CORE_RUNNER_API_TOKEN
            - name: FC_FINITE_PRIVATE_USAGE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: finite-computer-secrets
                  key: FC_FINITE_PRIVATE_USAGE_API_TOKEN
            - name: WORKOS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: finite-computer-secrets
                  key: WORKOS_API_KEY
            - name: WORKOS_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: finite-computer-secrets
                  key: WORKOS_CLIENT_ID
            - name: FC_WORKOS_OPERATOR_ORG_ID
              valueFrom:
                secretKeyRef:
                  name: finite-computer-secrets
                  key: FC_WORKOS_OPERATOR_ORG_ID
            - name: STRIPE_FINITE_COMPUTER_STANDARD_PRICE_ID
              valueFrom:
                configMapKeyRef:
                  name: finite-computer-config
                  key: STRIPE_FINITE_COMPUTER_STANDARD_PRICE_ID
            - name: FC_CORE_RELAY_STATE_DIR
              value: /var/lib/finite-saas-core/relay
          volumeMounts:
            - name: relay-state
              mountPath: /var/lib/finite-saas-core
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: relay-state
          persistentVolumeClaim:
            claimName: finite-saas-core-relay-state
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: finite-saas-core-relay-state
  namespace: finite-system
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
