apiVersion: v1
kind: Service
metadata:
  name: finite-core-postgres
  namespace: finite-system
spec:
  selector:
    app.kubernetes.io/name: finite-core-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: finite-core-postgres
  namespace: finite-system
spec:
  serviceName: finite-core-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: finite-core-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: finite-core-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: finite_core
            - name: POSTGRES_USER
              value: finite
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: finite-computer-secrets
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command:
                - pg_isready
                - --username=finite
                - --dbname=finite_core
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: finite-core-postgres-backups
  namespace: finite-system
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: finite-core-postgres-backup
  namespace: finite-system
spec:
  schedule: "17 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-dump
              image: postgres:16-alpine
              imagePullPolicy: IfNotPresent
              command: ["pg_dump"]
              args:
                - --host=finite-core-postgres
                - --username=finite
                - --dbname=finite_core
                - --format=custom
                - --file=/backups/finite_core_latest.dump
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: finite-computer-secrets
                      key: POSTGRES_PASSWORD
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: finite-core-postgres-backups
