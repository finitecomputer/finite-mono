apiVersion: v1
kind: Namespace
metadata:
  name: fc-specializations
---
apiVersion: v1
kind: Service
metadata:
  name: finite-specialization-worker
  namespace: fc-specializations
spec:
  type: NodePort
  selector:
    app.kubernetes.io/instance: shared
    app.kubernetes.io/name: finite-specialization-worker
  ports:
    - name: http
      port: 18998
      targetPort: http
      nodePort: 30998
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finite-specialization-worker
  namespace: fc-specializations
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/instance: shared
      app.kubernetes.io/name: finite-specialization-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: shared
        app.kubernetes.io/name: finite-specialization-worker
    spec:
      automountServiceAccountToken: false
      containers:
        - name: worker
          image: ghcr.io/finitecomputer/finite-specialization-worker:2026-07-14.1@sha256:e4922cb3717e261513ab7922ee3fed0ee1bd4e6f63f728d156893b059316f5c2
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              export FINITE_SPECIALIZATION_WORKER_BEARER_TOKEN="$(cat /worker-secrets/worker-token)"
              export SPARK_GATEWAY_BEARER_TOKEN="$(cat /worker-secrets/spark-gateway-token)"
              test -n "$FINITE_SPECIALIZATION_WORKER_BEARER_TOKEN"
              test -n "$SPARK_GATEWAY_BEARER_TOKEN"
              exec finite-specialization-worker serve --host 0.0.0.0 --port 18998
          env:
            - name: FINITE_SPECIALIZATION_VISION_MODEL
              value: aeon-gemma-4-12b-k4-nvfp4-unified-fast
            - name: FINITE_SPECIALIZATION_IMAGE_CANARY_INTERVAL_SECONDS
              value: "300"
            - name: FINITE_SPECIALIZATION_AUDIO_CANARY_INTERVAL_SECONDS
              value: "300"
            - name: FINITE_SPECIALIZATION_VIDEO_CANARY_INTERVAL_SECONDS
              value: "300"
            - name: FINITE_SPECIALIZATION_MEDIA_TEMP_DIR
              value: /var/run/finite-specialization-media
            - name: FINITE_SPECIALIZATION_MEDIA_CONCURRENCY
              value: "2"
            - name: FINITE_SPECIALIZATION_MAX_AUDIO_DURATION_SECONDS
              value: "900"
            - name: FINITE_SPECIALIZATION_MAX_VIDEO_DURATION_SECONDS
              value: "600"
            - name: FINITE_SPECIALIZATION_MAX_VIDEO_FRAMES
              value: "16"
          ports:
            - name: http
              containerPort: 18998
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "2"
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 0
            runAsNonRoot: false
            runAsUser: 0
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: worker-secrets
              mountPath: /worker-secrets
              readOnly: true
            - name: media-workspace
              mountPath: /var/run/finite-specialization-media
      terminationGracePeriodSeconds: 30
      volumes:
        - name: media-workspace
          emptyDir:
            sizeLimit: 256Mi
        - name: worker-secrets
          hostPath:
            path: /var/lib/finitecomputer/agent-cluster/secrets/finite-specialization-worker
            type: Directory
