name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - migration-integration

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      FC_CORE_POSTGRES_TEST_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        # Pinned to 1.93: 1.88's clippy trips uninlined_format_args on v2
        # crates, and floating stable (1.96 today) trips new let-chain lints
        # in devfinity. 1.93 is verified clean across the whole workspace.
        # Bump deliberately (run clippy locally first), don't float.
        # MSRV (rust-version 1.88) is still exercised by the release builds.
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test workspace
        run: cargo test --workspace --locked

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finitecomputer-v2/apps/dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: finitecomputer-v2/apps/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint dashboard
        run: npm run lint

      - name: Test dashboard
        run: npm test

      - name: Test dashboard product flows
        run: npm run test:browser

      - name: Build dashboard
        run: npm run build

  electron-alpha:
    name: Electron production-dashboard alpha
    needs:
      - rust
      - dashboard
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: Swatinem/rust-cache@v2

      - name: Device parity and Electron boundary gates
        run: nix develop --command just chat-device-parity

      - name: Build ad-hoc-signed internal alpha
        run: nix develop --command just chat-electron-package

      - name: Inspect packaged daemon and production-dashboard boundary
        run: |
          app="finitechat/apps/electron-chat/release/Finite Chat.app"
          test -x "$app/Contents/Resources/finitechatd"
          test -f "$app/Contents/Resources/app/electron/main.cjs"
          test -f "$app/Contents/Resources/app/electron/preload.cjs"
          grep -n 'https://finite\.computer' "$app/Contents/Resources/app/electron/main.cjs"
          ! grep -R -n -E 'spawn\("cargo"|cargo run' "$app/Contents/Resources/app/electron"
          codesign --verify --deep --strict --verbose=2 "$app"

      - name: Archive internal alpha
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "finitechat/apps/electron-chat/release/Finite Chat.app" \
            finitechat/apps/electron-chat/release/finite-chat-electron-alpha.zip

      - name: Publish internal alpha
        uses: actions/upload-artifact@v4
        with:
          name: finite-chat-electron-alpha-macos-${{ runner.arch }}
          path: finitechat/apps/electron-chat/release/finite-chat-electron-alpha.zip
          if-no-files-found: error

  hermes-bridge:
    name: finitechat Hermes bridge
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finitechat
    env:
      FINITE_HERMES_AGENT_VERSION: "0.18.2"
      # The hermes scripts resolve reports and built binaries relative to the
      # finitechat/ working directory (target/...); point cargo there too so
      # the two agree, exactly like the pre-mono repo layout.
      CARGO_TARGET_DIR: ${{ github.workspace }}/finitechat/target
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - uses: Swatinem/rust-cache@v2

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Hermes sidecar smoke
        run: scripts/hermes-sidecar-smoke.sh

      - name: Install Python tooling
        run: python3 -m pip install basedpyright==1.39.8 "hermes-agent==${FINITE_HERMES_AGENT_VERSION}" ruff==0.15.17

      - name: Ruff format
        run: ruff format --check .

      - name: Ruff check
        run: ruff check .

      - name: BasedPyright
        run: basedpyright

      - name: Hermes adapter regression report
        run: scripts/hermes-adapter-regression-report.py --report "$CARGO_TARGET_DIR/hermes-adapter-regressions/report.json"

      - name: Hermes platform adapter tests
        run: python3 -m unittest discover -s tests -p '*test*.py'

  nix-checks:
    name: Skills + search static checks (nix shell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - name: Skills check
        run: nix develop --command just skills check
      - name: Brain product language check
        run: nix develop --command just brain-language-check
      - name: Search check
        run: nix develop --command just search check
      - name: Canonical Runtime image contract
        run: nix develop --command just runtime-image-contract
      - name: lat1 existing-Runtime rollout contract
        run: nix develop --command just lat1-rollout-contract
      - name: Stripe Price contract
        run: nix develop --command just stripe-price-contract
      - name: Hosted Recovery Set contract
        run: nix develop --command just hosted-recovery-contract
      - name: Evaluate production NixOS configuration
        run: nix eval .#nixosConfigurations.finite-lat-1.config.system.build.toplevel.drvPath

  devfinity-smoke:
    name: devfinity services-only smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: Swatinem/rust-cache@v2
      - name: Prebuild stack binaries
        # devfinity's readiness window is shorter than a cold compile of the
        # whole stack on a hosted runner; build first so the preflight is a
        # no-op and the wait measures actual service startup. One build per
        # package: combined -p builds unify features (resolver 2) and produce
        # artifacts the per-package `cargo run` invocations don't reuse.
        run: |
          nix develop --command cargo build --locked -p devfinity
          nix develop --command cargo build --locked -p finite-saas-core
          nix develop --command cargo build --locked -p finitechat-server
          nix develop --command cargo build --locked -p finitechat-hosted-device
          nix develop --command cargo build --locked -p finitesitesd
      - name: devfinity smoke
        env:
          # Cold-cache runs (e.g. when the Actions cache service hiccups)
          # compile the stack inside the readiness window; give CI headroom.
          DEVFINITY_READY_TIMEOUT_SECS: "600"
        run: nix develop --command just dev smoke
      - name: Dump devfinity logs on failure
        if: failure()
        run: |
          for f in .local-state/dfs/runs/default/logs/*; do
            echo "===== $f ====="
            tail -50 "$f" || true
          done

  brain-product-matrix:
    name: Brain full-product matrix
    runs-on: [self-hosted, Linux, X64, finite-lat-2, docker]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          # Containerized failures preserve root-owned diagnostics. Use a fresh
          # checkout per attempt so those artifacts cannot poison checkout.
          path: brain-matrix-${{ github.run_id }}-${{ github.run_attempt }}
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: brain-matrix-${{ github.run_id }}-${{ github.run_attempt }} -> target
      - name: Install Brain matrix browser
        working-directory: brain-matrix-${{ github.run_id }}-${{ github.run_attempt }}/finitecomputer-v2/apps/dashboard
        run: |
          nix develop --command npm ci
          nix develop --command npx playwright install chromium
      - name: Real Hermes, managed skill, Runtime, fbrain, signed Brain, Hosted Device, and Product Client
        working-directory: brain-matrix-${{ github.run_id }}-${{ github.run_attempt }}
        run: nix develop --command just brain-product-matrix
      - name: Upload boundary report and failure logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brain-product-matrix
          path: brain-matrix-${{ github.run_id }}-${{ github.run_attempt }}/target/brain-product-matrix
          if-no-files-found: error
