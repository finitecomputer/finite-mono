name: Release fbrain

# Component-scoped release: tag `fbrain/vX.Y.Z` on finite-mono.
# The mirror job republishes to the legacy finitecomputer/finite-brain repo
# (tag vX.Y.Z) until every installer points at finite-mono.

on:
  push:
    tags:
      - "fbrain/v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            asset_name: fbrain-linux-x86_64
            target: x86_64-unknown-linux-gnu
          - runs_on: macos-14
            asset_name: fbrain-macos-aarch64
            target: aarch64-apple-darwin
          - runs_on: macos-14
            asset_name: fbrain-macos-x86_64
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install 1.88.0 --profile minimal
          rustup default 1.88.0
          rustup target add "${{ matrix.target }}"

      - name: Build fbrain
        run: cargo build --locked --release --target "${{ matrix.target }}" --package finite-brain-cli --bin fbrain

      - name: Package fbrain
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/fbrain" dist/fbrain
          tar -C dist -czf "${{ matrix.asset_name }}.tar.gz" fbrain
          shasum -a 256 "${{ matrix.asset_name }}.tar.gz" > "${{ matrix.asset_name }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}.tar.gz
            ${{ matrix.asset_name }}.tar.gz.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$tag" release-assets/* --repo "$GITHUB_REPOSITORY" --title "$tag" --generate-notes
          fi

  mirror:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Mirror release to finitecomputer/finite-brain
        env:
          GH_TOKEN: ${{ secrets.RELEASE_MIRROR_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::notice::RELEASE_MIRROR_TOKEN not configured; skipping mirror release."
            exit 0
          fi
          repo=finitecomputer/finite-brain
          tag="${GITHUB_REF_NAME#fbrain/}"
          notes="Mirror of finite-mono release ${GITHUB_REF_NAME} (commit ${GITHUB_SHA}). Canonical: https://github.com/${GITHUB_REPOSITORY}/releases"
          if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --repo "$repo" --clobber
          else
            gh release create "$tag" release-assets/* --repo "$repo" --title "$tag" --notes "$notes"
          fi
