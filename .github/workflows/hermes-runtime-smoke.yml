name: Hermes runtime smoke

# Ported from finitechat's pre-mono Docker smoke. It now builds and proves the
# one canonical finite-mono Agent Runtime image. This workflow never publishes
# a second Hermes-only runtime; `.github/workflows/runtime-image.yml` is the
# sole publication path.
#
# Dispatch-only because it runs on the self-hosted lat2 Docker runner. Keep the
# production-image proof explicit until it has enough green history to become
# a normal main-branch gate.

run-name: Hermes runtime smoke (${{ github.ref_name }})

on:
  workflow_dispatch:
    inputs:
      durable_home_docker_smoke:
        description: "Run canonical Docker Add/Welcome chat plus durable /data restart smoke"
        required: false
        type: boolean
        default: true
      chat_interruption_smoke:
        description: "Run graceful, SIGKILL, and empty-target chat recovery matrix"
        required: false
        type: boolean
        default: true

env:
  FINITE_HERMES_AGENT_VERSION: "0.18.2"

permissions:
  contents: read

jobs:
  docker-runtime-smoke:
    name: Docker runtime smoke
    runs-on: [self-hosted, Linux, X64, finite-lat-2, docker]
    timeout-minutes: 75
    defaults:
      run:
        working-directory: finitechat
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set runtime image ref
        run: |
          image_ref="finite-agent-runtime-smoke:${GITHUB_SHA}"
          echo "RUNTIME_IMAGE_REF=$image_ref" >> "$GITHUB_ENV"
          echo "FINITE_DOCKER_IMAGE=$image_ref" >> "$GITHUB_ENV"

      - name: Build canonical runtime image
        run: |
          ../finitecomputer-v2/scripts/build_runtime_image.py \
            --image-ref "$RUNTIME_IMAGE_REF" \
            --hermes-agent-version "$FINITE_HERMES_AGENT_VERSION" \
            --platform linux/amd64 \
            --report target/hermes-docker-smoke/image-build.json

      - name: Durable home Docker smoke
        if: ${{ inputs.durable_home_docker_smoke }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FINITECHAT_HERMES_MODEL: ${{ vars.FINITECHAT_HERMES_MODEL || 'anthropic/claude-sonnet-4.6' }}
          FINITECHAT_HERMES_PROVIDER: ${{ vars.FINITECHAT_HERMES_PROVIDER || 'openrouter' }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "The default Add/Welcome chat smoke requires the OPENROUTER_API_KEY secret." >&2
            exit 1
          fi
          python3 -m py_compile scripts/hermes-durable-home-docker-smoke.py
          scripts/hermes-durable-home-docker-smoke.py \
            --image "$RUNTIME_IMAGE_REF" \
            --report target/hermes-durable-home-docker-smoke/report.json

      - name: In-flight chat interruption and restore smoke
        if: ${{ inputs.chat_interruption_smoke }}
        run: |
          cargo build --locked -p finitechat-server
          python3 -m py_compile scripts/hermes-chat-interruption-docker-smoke.py
          scripts/hermes-chat-interruption-docker-smoke.py \
            --image "$RUNTIME_IMAGE_REF" \
            --report target/hermes-chat-interruption-docker-smoke/report.json

      - name: Build hardening evidence audit
        if: always()
        run: scripts/hermes-hardening-audit.py --report target/hermes-hardening-audit.json

      - name: Prepare Docker runtime smoke artifacts
        if: always()
        run: |
          if [ -d target/hermes-docker-smoke ]; then
            sudo chown -R "$(id -u):$(id -g)" target/hermes-docker-smoke
            chmod -R u+rwX,go+rX target/hermes-docker-smoke
          fi

      - name: Upload Docker runtime smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hermes-docker-smoke-report
          path: |
            finitechat/target/hermes-hardening-audit.json
            finitechat/target/hermes-docker-smoke/image-build.json
            finitechat/target/hermes-docker-smoke/report.json
            finitechat/target/hermes-docker-smoke/restic-preflight.json
            finitechat/target/hermes-durable-home-docker-smoke/report.json
            finitechat/target/hermes-chat-interruption-docker-smoke/report.json
          if-no-files-found: ignore
