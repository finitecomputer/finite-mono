# Active Finite multimodal specialization fragment.
#
# Hermes auxiliary.vision uses the shared compatibility worker. The worker
# sends image and sampled-video inputs through Responses and canonical WAV
# audio through Chat Completions.

specialization:
  id: vision-input.spark-nemotron3-nano
  status: active_verified_specialization
  verified_at: "2026-07-18"
  capability_id: vision-input
  target_agent_profile: glm52-text-agent
  hermes_surface: auxiliary.vision
  backing_plane: spark-public-beta

spark_route:
  base_url: https://inference.finite.computer/v1
  model: nemotron-3-nano-omni-30b-a3b-reasoning-nvfp4-fast
  required_capabilities:
    images: true
    audio_understanding: true
    sampled_video: true
    responses: true
    chat_completions: true
  health_requirement:
    route_health: healthy
    capability_smoke: multimodal_semantic_matrix

compatibility_bridge:
  required: true
  service_name: finite-specialization-worker
  service_namespace: fc-specializations
  service_port: 18998
  bridge_base_url: http://finite-specialization-worker.fc-specializations.svc.cluster.local:18998/v1
  secret_inputs:
    FINITE_SPECIALIZATION_WORKER_BEARER_TOKEN: external_secret_only
  reconciliation:
    command: agent.specialization.aeon.reconcile
    schema: finite.agent.specialization.aeon.reconcile.v1
    owned_path: auxiliary.vision
  prompt_versions:
    image: aeon-image-analysis-v1
    audio: aeon-audio-understanding-v1
    video: aeon-video-understanding-v1
  normalization_limits:
    max_images: 8
    max_inline_bytes: 16777216
    max_download_bytes: 33554432
    max_output_chars: 32768
  active_capabilities:
    image: true
    audio: true
    video: true

hermes_fragment:
  auxiliary:
    vision:
      provider: custom
      model: nemotron-3-nano-omni-30b-a3b-reasoning-nvfp4-fast
      base_url: http://finite-specialization-worker.fc-specializations.svc.cluster.local:18998/v1
      api_key: external_worker_secret_only
      api_mode: chat_completions
      timeout: 120
      download_timeout: 30

verification:
  checkpoint: docs/checkpoints/2026-07-18-austin-multimodal-spark-nemotron3-nano.md
  normalized_result_fields:
    - capability
    - text
    - model
    - request_id
    - duration_ms

rollback:
  scope: nemotron_route_and_media_admission
  action: Fail the Nemotron aliases closed before runtime changes; reduce worker, runtime, and route admission together to c4 if c8 is unhealthy, then require fresh image, audio, and video canaries. Gemma is retired and is not a rollback target.
