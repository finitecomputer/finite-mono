name: finite-search-searxng

services:
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "${SEARXNG_BIND:-127.0.0.1}:${SEARXNG_PORT:-8080}:8080"
    environment:
      SEARXNG_SECRET: "${SEARXNG_SECRET:?set SEARXNG_SECRET in .env}"
      SEARXNG_BASE_URL: "${SEARXNG_BASE_URL:-}"
      SEARXNG_LIMITER: "${SEARXNG_LIMITER:-false}"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- 'http://127.0.0.1:8080/healthz' >/dev/null",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
