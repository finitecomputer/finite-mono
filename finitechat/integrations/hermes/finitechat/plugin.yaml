name: finitechat
kind: platform
version: 0.4.1
description: >
  Finite Chat platform adapter for Hermes. Connects Hermes to E2EE Finite
  Chat rooms through the resident finitechat service. A user Device starts a
  chat with the Agent Principal using KeyPackage/Add/Welcome admission; the
  agent does not create an invite session or choose a room at startup. All
  message senders are MLS-authenticated.
author: finitecomputer
provides_hooks:
  - pre_tool_call
  - post_tool_call
requires_env:
  - name: FINITECHAT_HOME
    description: >
      Agent home directory created by `finitechat hermes init
      --server URL` (holds the durable encrypted client store; the account key
      is the shared Finite identity, see FINITE_HOME).
optional_env:
  - name: FINITE_HOME
    description: >
      Shared Finite identity root override: the account key lives at
      $FINITE_HOME/identity/identity.json (default ~/.finite/identity/).
      Hosted runtimes pin this to the durable mount.
  - name: FINITECHAT_BIN
    description: "Path to the finitechat binary (default: found on PATH)."
  - name: FINITECHAT_ROOM_ID
    description: "Optional room filter; by default every joined room is served."
