[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
  "B",
  "E",
  "F",
  "I",
  "RUF",
  "SIM",
  "UP",
]
ignore = [
  "E501",
]

[tool.basedpyright]
include = [
  "containers",
  "integrations",
  "tests",
]
exclude = [
  "**/__pycache__",
  "target",
]
pythonVersion = "3.11"
typeCheckingMode = "basic"
reportMissingTypeStubs = "none"
