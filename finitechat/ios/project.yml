name: FiniteChat
options:
  bundleIdPrefix: computer.finite
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: computer.finite.finitechat
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: 5.0
    TARGETED_DEVICE_FAMILY: 1
    ONLY_ACTIVE_ARCH: YES
    ALWAYS_SEARCH_USER_PATHS: NO
    EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64

targets:
  FiniteChat:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Bindings
        excludes:
          - "*.h"
          - "*.modulemap"
    settings:
      base:
        DEVELOPMENT_TEAM: JBLHZ83X6T
        PRODUCT_NAME: "$(TARGET_NAME)"
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: FiniteChat.entitlements
        ENABLE_TESTABILITY: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    dependencies:
      - framework: Frameworks/FinitechatCore.xcframework
        embed: false
  FiniteChatTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: FiniteChat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: computer.finite.finitechat.tests
        PRODUCT_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/FiniteChat.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/FiniteChat"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  FiniteChat:
    build:
      targets:
        FiniteChat: all
        FiniteChatTests: [test]
    test:
      targets:
        - FiniteChatTests
    run:
      config: Debug
